name: Automation Runner

on:
  workflow_dispatch:
    inputs:
      automation_id:
        description: "Automation ID from automation_settings"
        required: true
        type: string
      trigger_source:
        description: "Who triggered this run"
        required: false
        default: "manual"
        type: string

jobs:
  run-automation:
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate automation id
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ inputs.automation_id }}")) {
            Write-Error "automation_id is required"
            exit 1
          }

      - name: Run automation job
        env:
          VW_BASE_DATA_DIR: C:\VideoWorkflow
          VW_FFMPEG_PATH: ffmpeg
          VW_FFPROBE_PATH: ffprobe
          RUNNER_CALLBACK_URL: ${{ vars.GH_RUNNER_CALLBACK_URL }}
          RUNNER_CALLBACK_SECRET: ${{ vars.GH_RUNNER_CALLBACK_SECRET }}
        shell: pwsh
        run: |
          & "C:\xampp\php\php.exe" -v
          & "C:\xampp\php\php.exe" scripts/github-runner-job.php "${{ inputs.automation_id }}"
