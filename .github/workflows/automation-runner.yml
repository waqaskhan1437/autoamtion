name: Automation Runner
run-name: Automation #${{ inputs.automation_id || github.event.client_payload.automation_id || 'dispatch' }}

on:
  repository_dispatch:
    types:
      - automation_run
  workflow_dispatch:
    inputs:
      automation_id:
        description: "Automation ID"
        required: false
        type: string
      payload_gzip_b64:
        description: "Base64 GZIP payload from local dispatcher"
        required: true
        type: string

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: video_workflow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, ftp, mbstring, json, pdo, pdo_mysql, zlib

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg default-mysql-client
          python3 -m pip install --user yt-dlp
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Decode automation payload
        id: payload
        env:
          DISPATCH_PAYLOAD: ${{ github.event.client_payload.payload_gzip_b64 }}
          INPUT_PAYLOAD: ${{ github.event.inputs.payload_gzip_b64 }}
        run: |
          python3 - <<'PY'
          import os, json, base64, gzip, pathlib

          payload_b64 = os.getenv("DISPATCH_PAYLOAD", "").strip() or os.getenv("INPUT_PAYLOAD", "").strip()
          if not payload_b64:
              raise SystemExit("Missing payload_gzip_b64")

          raw = gzip.decompress(base64.b64decode(payload_b64))
          data = json.loads(raw.decode("utf-8"))
          pathlib.Path("payload.json").write_text(json.dumps(data, ensure_ascii=False), encoding="utf-8")

          automation = data.get("automation") or {}
          automation_id = str(automation.get("id") or "")
          if not automation_id:
              raise SystemExit("automation.id missing in payload")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"automation_id={automation_id}\n")

          print("Payload decoded for automation:", automation_id)
          PY

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Create schema
        run: |
          awk '/-- Insert Demo Data/{exit} {print}' database.sql > /tmp/schema.sql
          mysql -h127.0.0.1 -uroot -proot video_workflow < /tmp/schema.sql
          mysql -h127.0.0.1 -uroot -proot video_workflow -e "ALTER TABLE automation_settings MODIFY COLUMN api_key_id INT NULL;"

      - name: Apply app migrations
        env:
          VW_DB_HOST: 127.0.0.1
          VW_DB_NAME: video_workflow
          VW_DB_USER: root
          VW_DB_PASS: root
        run: |
          php -r "require 'config.php'; echo 'Runner DB migrations applied', PHP_EOL;"

      - name: Seed DB from payload
        env:
          VW_DB_HOST: 127.0.0.1
          VW_DB_NAME: video_workflow
          VW_DB_USER: root
          VW_DB_PASS: root
        run: |
          php scripts/bootstrap-runner-db.php payload.json

      - name: Prepare yt-dlp cookies
        env:
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
          YTDLP_COOKIES_B64_1: ${{ secrets.YTDLP_COOKIES_B64_1 }}
          YTDLP_COOKIES_B64_2: ${{ secrets.YTDLP_COOKIES_B64_2 }}
          YTDLP_COOKIES_B64_3: ${{ secrets.YTDLP_COOKIES_B64_3 }}
          YTDLP_COOKIES_B64_4: ${{ secrets.YTDLP_COOKIES_B64_4 }}
          YTDLP_COOKIES_B64_5: ${{ secrets.YTDLP_COOKIES_B64_5 }}
          YTDLP_COOKIES_B64_6: ${{ secrets.YTDLP_COOKIES_B64_6 }}
          YTDLP_COOKIES_B64_7: ${{ secrets.YTDLP_COOKIES_B64_7 }}
          YTDLP_COOKIES_B64_8: ${{ secrets.YTDLP_COOKIES_B64_8 }}
          YTDLP_COOKIES_B64_9: ${{ secrets.YTDLP_COOKIES_B64_9 }}
          YTDLP_COOKIES_B64_10: ${{ secrets.YTDLP_COOKIES_B64_10 }}
        run: |
          if [ -z "${YTDLP_COOKIES_B64}" ] && [ -z "${YTDLP_COOKIES_B64_1}" ]; then
            echo "No YTDLP_COOKIES_B64 secret configured; YouTube may hit bot checks."
            exit 0
          fi
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          chunks = []
          for idx in range(1, 11):
              value = os.environ.get(f"YTDLP_COOKIES_B64_{idx}", "").strip()
              if value:
                  chunks.append(value)

          raw = ''.join(chunks) if chunks else os.environ.get("YTDLP_COOKIES_B64", "").strip()
          target = Path(os.environ["RUNNER_TEMP"]) / "youtube-cookies.txt"
          target.write_bytes(base64.b64decode(raw))
          print(f"Wrote cookies file to {target}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"VW_YTDLP_COOKIES_FILE={target}\n")
          PY

      - name: Run automation job
        env:
          VW_DB_HOST: 127.0.0.1
          VW_DB_NAME: video_workflow
          VW_DB_USER: root
          VW_DB_PASS: root
          VW_BASE_DATA_DIR: /tmp/VideoWorkflow
          VW_FFMPEG_PATH: ffmpeg
          VW_FFPROBE_PATH: ffprobe
          RUNNER_CALLBACK_URL: ${{ vars.GH_RUNNER_CALLBACK_URL }}
          RUNNER_CALLBACK_SECRET: ${{ vars.GH_RUNNER_CALLBACK_SECRET }}
        run: |
          php -v
          php scripts/github-runner-job.php "${{ steps.payload.outputs.automation_id }}"

      - name: Upload output videos artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-output-${{ steps.payload.outputs.automation_id }}-${{ github.run_id }}
          path: /tmp/VideoWorkflow/output/*
          if-no-files-found: ignore
          retention-days: 3
